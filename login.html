<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — HostelCare</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-icon">H</div>
    <h2>Welcome Back</h2>
    <p>Sign in to your HostelCare account</p>
  </div>

  <div id="error-box" class="form-error"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="login-email" placeholder="your@email.com" autocomplete="off" />
  </div>
  <div class="form-group">
    <label>
      Password
      <a href="forgot-password.html" style="float:right;font-size:13px;color:#6366f1;font-weight:500;text-decoration:none;">Forgot password?</a>
    </label>
    <input type="password" id="login-password" placeholder="Enter your password" autocomplete="off" />
  </div>

  <button class="btn-full" id="login-btn">Sign In</button>

  <div class="auth-footer">
    New here? <a href="signup.html">Create an account</a>
    &nbsp;&middot;&nbsp;
    <a href="index.html">Home</a>
  </div>

  <div style="text-align:center;margin-top:16px;">
    <button data-dark-toggle class="btn-icon"><span class="theme-icon">moon</span></button>
  </div>
</div>

<div id="notif-container" class="notif-container"></div>

<script src="script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('login-password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      var emailEl    = document.getElementById('login-email');
      var passwordEl = document.getElementById('login-password');
      var errBox     = document.getElementById('error-box');
      var btn        = document.getElementById('login-btn');

      var email    = emailEl.value.trim().toLowerCase();
      var password = passwordEl.value;

      errBox.textContent = '';
      errBox.classList.remove('show');

      if (!email || !password) {
        errBox.textContent = 'Please enter your email and password.';
        errBox.classList.add('show');
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;

      const res = await API.post('/auth/login', { email, password });

      btn.textContent = 'Sign In';
      btn.disabled = false;

      if (!res.ok) {
        errBox.textContent = res.msg || 'Invalid email or password.';
        errBox.classList.add('show');
        return;
      }

      API.setToken(res.token);
      Auth.setCurrentUser(res.user);

      if (res.user.role === 'warden') {
        window.location.href = 'warden-dashboard.html';
      } else if (res.user.role === 'student') {
        window.location.href = 'student-dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    }

  });
</script>
</body>
</html>
