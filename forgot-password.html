<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — HostelCare</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-icon">H</div>
    <h2>Forgot Password</h2>
    <p>Enter your email and we'll send you a reset link</p>
  </div>

  <div id="success-box" class="form-success" style="display:none;background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px;"></div>
  <div id="error-box" class="form-error"></div>

  <div class="form-group" id="email-group">
    <label>Email Address</label>
    <input type="email" id="fp-email" placeholder="your@email.com" autocomplete="off" />
  </div>

  <button class="btn-full" id="fp-btn">Send Reset Link</button>

  <div class="auth-footer" style="margin-top:20px;">
    Remember your password? <a href="login.html">Back to Login</a>
  </div>
</div>

<div id="notif-container" class="notif-container"></div>

<script src="script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var btn      = document.getElementById('fp-btn');
    var emailEl  = document.getElementById('fp-email');
    var errBox   = document.getElementById('error-box');
    var succBox  = document.getElementById('success-box');

    btn.addEventListener('click', doForgotPassword);
    emailEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doForgotPassword();
    });

    async function doForgotPassword() {
      var email = emailEl.value.trim().toLowerCase();
      errBox.textContent = '';
      errBox.classList.remove('show');
      succBox.style.display = 'none';

      if (!email) {
        errBox.textContent = 'Please enter your email address.';
        errBox.classList.add('show');
        return;
      }

      btn.textContent = 'Sending…';
      btn.disabled = true;

      const res = await API.post('/auth/forgot-password', { email });

      btn.textContent = 'Send Reset Link';
      btn.disabled = false;

      if (!res.ok) {
        errBox.textContent = res.msg || 'Something went wrong. Please try again.';
        errBox.classList.add('show');
        return;
      }

      // Hide the form and show success
      document.getElementById('email-group').style.display = 'none';
      btn.style.display = 'none';
      succBox.style.display = 'block';
      succBox.innerHTML = '✅ <strong>Check your inbox!</strong> If that email is registered, a password reset link has been sent. Check your spam folder if you don\'t see it.';
    }
  });
</script>
</body>
</html>
