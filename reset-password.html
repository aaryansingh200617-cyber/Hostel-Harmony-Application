<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — HostelCare</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-icon">H</div>
    <h2>Reset Password</h2>
    <p>Enter your new password below</p>
  </div>

  <div id="success-box" class="form-success" style="display:none;background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px;"></div>
  <div id="error-box" class="form-error"></div>

  <div id="form-area">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="rp-password" placeholder="At least 6 characters" />
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="rp-confirm" placeholder="Repeat your new password" />
    </div>
    <button class="btn-full" id="rp-btn">Reset Password</button>
  </div>

  <div id="invalid-link" style="display:none;text-align:center;color:#ef4444;padding:20px 0;">
    <p>⚠️ This reset link is invalid or has expired.</p>
    <a href="forgot-password.html" class="btn-full" style="display:inline-block;margin-top:12px;">Request a new link</a>
  </div>

  <div class="auth-footer" style="margin-top:20px;">
    <a href="login.html">← Back to Login</a>
  </div>
</div>

<div id="notif-container" class="notif-container"></div>

<script src="script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var params = new URLSearchParams(window.location.search);
    var token  = params.get('token');
    var email  = params.get('email');

    if (!token || !email) {
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('invalid-link').style.display = 'block';
      return;
    }

    var btn       = document.getElementById('rp-btn');
    var passEl    = document.getElementById('rp-password');
    var confirmEl = document.getElementById('rp-confirm');
    var errBox    = document.getElementById('error-box');
    var succBox   = document.getElementById('success-box');

    btn.addEventListener('click', doReset);
    confirmEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') doReset(); });

    async function doReset() {
      var password = passEl.value;
      var confirm  = confirmEl.value;

      errBox.textContent = '';
      errBox.classList.remove('show');

      if (!password || !confirm) {
        errBox.textContent = 'Please fill in both fields.';
        errBox.classList.add('show');
        return;
      }
      if (password.length < 6) {
        errBox.textContent = 'Password must be at least 6 characters.';
        errBox.classList.add('show');
        return;
      }
      if (password !== confirm) {
        errBox.textContent = 'Passwords do not match.';
        errBox.classList.add('show');
        return;
      }

      btn.textContent = 'Resetting…';
      btn.disabled = true;

      const res = await API.post('/auth/reset-password', { token, email, password });

      btn.textContent = 'Reset Password';
      btn.disabled = false;

      if (!res.ok) {
        errBox.textContent = res.msg || 'Something went wrong. Please try again.';
        errBox.classList.add('show');
        return;
      }

      document.getElementById('form-area').style.display = 'none';
      succBox.style.display = 'block';
      succBox.innerHTML = '✅ <strong>Password reset successfully!</strong> <a href="login.html" style="color:#065f46;font-weight:600;">Click here to log in</a>';
    }
  });
</script>
</body>
</html>
